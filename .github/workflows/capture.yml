name: Capture PNG

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run repeated captures
        run: |
          for i in {1..20}
          do
            python capture_image.py
            sleep 60
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: png-capture-${{ github.run_id }}-${{ github.run_number }}
          path: captures/
          retention-days: 90
