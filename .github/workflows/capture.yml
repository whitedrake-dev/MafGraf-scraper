name: Capture PNG

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # -----------------------------
  # Core capture settings
  # -----------------------------
  IMAGE_URL: "https://mafie.podsveti.cz/graf/"
  CAPTURE_DIR: "captures"
  CAPTURE_TIMEZONE: "Europe/Prague"

  # -----------------------------
  # Retry settings for Python
  # -----------------------------
  RETRY_TOTAL: 5
  RETRY_TIMEOUT: 20
  RETRY_BACKOFF: 1

  # -----------------------------
  # Loop settings for shell script
  # -----------------------------
  CAPTURE_REPEATS: 39        # Number of captures after the initial probe
  BASE_SLEEP: 60             # Base delay between captures (seconds)
  JITTER_RANGE: 5            # Jitter range: actual jitter is [-5, +5] seconds

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run capture loop
        run: bash scripts/run_capture.sh

      - name: Upload captures
        uses: actions/upload-artifact@v4
        with:
          name: png-capture-${{ github.run_id }}-${{ github.run_number }}
          path: captures/
          retention-days: 90
